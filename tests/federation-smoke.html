<!DOCTYPE html>
<!--
  federation-smoke.html
  Phase 2A (F2) — federation smoke harness.

  How to run:
    python3 -m http.server 8767       # from repo root
    open http://localhost:8767/tests/federation-smoke.html

  Asserts:
    1. federated.length === 5 (top-k contract preserved).
    2. federationStats.enabled === true &&
       lastKPrime === 5 + Math.ceil(Math.sqrt(5 * Math.log(2))).
    3. Every id in federated exists in at least one shard's pre-dedup set.
    4. Non-federated recommendSeeds still works (baseline sanity).
    5. Federated result is non-empty (we have a populated archive).
    6. Federation-off and federation-on return top-k of requested size.
    7. Frozen-mode compose check: a brain archived AFTER freeze is
       absent from the federated result (1C filter still applies under F2).
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Federation smoke (F2)</title>
  <style>
    body { font: 14px/1.5 system-ui, -apple-system, sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { font-size: 1.2rem; margin: 0 0 .4em; }
    #summary { padding: .7em 1em; border-radius: 6px; margin: 1em 0; font-weight: 600; }
    #summary.pass { background: #d3f9d8; color: #2b8a3e; }
    #summary.fail { background: #ffe3e3; color: #c92a2a; }
    #summary.pending { background: #fff3bf; color: #5c3c00; }
    table { border-collapse: collapse; width: 100%; margin-top: .6em; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; vertical-align: top; }
    th { background: #f4f4f4; }
    tr.fail { background: #fff5f5; }
    tr.pass td:first-child { color: #2b8a3e; }
    pre { background: #f4f4f4; padding: .4em .6em; border-radius: 3px; overflow-x: auto; font-size: 11px; margin: .3em 0; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Federation smoke (Phase 2A / F2)</h1>
  <p>Exercises <code>setFederationEnabled</code>, <code>fanOut</code> over
     two brain indexes, hash-based union, GNN rerank on the union, and
     composition with the 1C frozen consistency mode.</p>
  <div id="summary" class="pending">Running…</div>
  <table id="results">
    <thead><tr><th>#</th><th>claim</th><th>verdict</th><th>detail</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <!-- NeuralNetwork is a classic-script global used by archiveBrain's
       flatten(). -->
  <script src="../AI-Car-Racer/network.js"></script>
  <script>window.NeuralNetwork = NeuralNetwork; window.Level = Level;</script>

  <script type="module">
    import * as bridge from '../AI-Car-Racer/ruvectorBridge.js';
    import * as mode from '../AI-Car-Racer/consistency/mode.js';
    import { FLAT_LENGTH, TOPOLOGY } from '../AI-Car-Racer/brainCodec.js';
    import { kPrime } from '../AI-Car-Racer/federation/fanout.js';
    import { createCapturer } from '../AI-Car-Racer/federation/viewer.js';

    const TRACK_DIM = 512;
    const rows = document.getElementById('rows');
    const summary = document.getElementById('summary');
    const results = [];
    function record(name, ok, detail){
      results.push({ name, ok, detail });
      const tr = document.createElement('tr');
      tr.className = ok ? 'pass' : 'fail';
      tr.innerHTML =
        '<td>' + results.length + '</td>' +
        '<td>' + name + '</td>' +
        '<td>' + (ok ? 'PASS' : 'FAIL') + '</td>' +
        '<td><pre>' + escapeHtml(typeof detail === 'string' ? detail : JSON.stringify(detail, null, 2)) + '</pre></td>';
      rows.appendChild(tr);
    }
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Generate a deterministic fixture: N brains sharing one track so
    // the track-join yields a non-trivial candidate set.
    function makeFixture(brainCount, sharedTrackVec){
      const brains = [];
      for (let i = 0; i < brainCount; i++){
        const vec = new Float32Array(FLAT_LENGTH);
        for (let j = 0; j < FLAT_LENGTH; j++) vec[j] = Math.sin((i + 1) * (j + 1) * 0.013);
        brains.push({
          id: 'brain_fixture_' + i,
          vec: Array.from(vec),
          meta: { fitness: 10 + i, trackId: 'track_A', generation: 0, parentIds: [] },
        });
      }
      const tracks = [{
        id: 'track_A',
        vec: Array.from(sharedTrackVec),
        meta: { firstSeen: Date.now() },
      }];
      return { brains, tracks, observations: [] };
    }

    function makeTrackVec(seed){
      const v = new Float32Array(TRACK_DIM);
      for (let i = 0; i < TRACK_DIM; i++) v[i] = Math.sin((seed + 1) * (i + 1) * 0.0011);
      let sq = 0; for (let i = 0; i < TRACK_DIM; i++) sq += v[i]*v[i];
      const n = Math.sqrt(sq) || 1;
      for (let i = 0; i < TRACK_DIM; i++) v[i] = v[i] / n;
      return v;
    }

    try {
      await bridge.ready();
      await bridge._debugReset();
      mode._debugReset();

      const trackVec = makeTrackVec(73);
      const fixture = makeFixture(20, trackVec);
      bridge.hydrateFromFixture(fixture);

      // ── Claim 4 first: federation OFF baseline is non-empty. ─────────
      bridge.setFederationEnabled(false);
      const baselineSingle = bridge.recommendSeeds(trackVec, 5);
      record('4. federation OFF — non-empty baseline',
             Array.isArray(baselineSingle) && baselineSingle.length > 0,
             { length: Array.isArray(baselineSingle) ? baselineSingle.length : 'not-array',
               firstIds: baselineSingle.slice(0, 3).map(h => h.id) });

      // ── Flip federation on and re-query. ────────────────────────────
      bridge.setFederationEnabled(true);
      // Register a capturer so we can inspect per-shard pre-dedup results.
      const capturer = createCapturer();
      if (typeof bridge.setFederationCapturer === 'function') {
        bridge.setFederationCapturer(capturer);
      }
      const federated = bridge.recommendSeeds(trackVec, 5);
      const fedStats = bridge.getFederationStats();
      const snap = capturer.last();

      // Claim 1: top-k contract preserved.
      record('1. federated.length === 5',
             federated.length === 5,
             { length: federated.length });

      // Claim 2: stats + kPrime formula. When hyperbolic wasm is loaded
      // (the normal case) S=2 and kPrime(5,2) = 5 + ⌈√(5·ln2)⌉ = 5+2 = 7.
      // When the wasm fails to load we gracefully degrade to S=1 and
      // kPrime(5,1) = 5 (no over-request — union bound trivial for one
      // shard). Either way the formula must hold.
      const idealKP = 5 + Math.ceil(Math.sqrt(5 * Math.log(2)));
      const expectedKP = kPrime(5, fedStats.shards);
      const formulaHolds = fedStats.enabled === true && fedStats.lastKPrime === expectedKP;
      const fullFederation = fedStats.shards === 2 && fedStats.lastKPrime === idealKP;
      record('2. federationStats.enabled && lastKPrime = k + ⌈√(k·ln S)⌉',
             formulaHolds,
             { stats: fedStats, expectedKPrimeForLiveShards: expectedKP,
               idealKPrime_S2: idealKP, fullFederation });

      // Claim 3: every federated id appears in at least one shard's
      // pre-dedup result set. The capturer snapshot records exactly
      // what each shard returned before union + rerank, so this is a
      // direct assertion on the federation pipeline.
      const shardIds = new Set();
      if (snap && Array.isArray(snap.shards)) {
        for (const sh of snap.shards) {
          for (const r of (sh.results || [])) shardIds.add(String(r.id));
        }
      }
      const allFederatedInShards = federated.every(hit => shardIds.has(String(hit.id)));
      record('3. every federated id surfaces in at least one shard pre-dedup',
             allFederatedInShards && shardIds.size > 0,
             { federatedIds: federated.map(h => h.id),
               shardCount: snap ? snap.shards.length : 0,
               shardIdsSize: shardIds.size,
               unionSize: snap ? snap.unionSize : 0,
               dedupeHits: snap ? snap.dedupeHits : 0 });

      // Claim 5: federated result is non-empty.
      record('5. federated result non-empty',
             federated.length > 0,
             { length: federated.length, firstIds: federated.slice(0, 3).map(h => h.id) });

      // Claim 6: requested-size contract.
      const k3 = bridge.recommendSeeds(trackVec, 3);
      const k10 = bridge.recommendSeeds(trackVec, 10);
      record('6. federated top-k respects requested k',
             k3.length === 3 && k10.length <= 10 && k10.length >= Math.min(10, fixture.brains.length),
             { k3Len: k3.length, k10Len: k10.length });

      // ── Claim 7: frozen compose check. ──────────────────────────────
      // Set consistency → frozen, then archive a brand-new brain and
      // verify it doesn't appear in the federated result.
      bridge.setConsistencyMode('fresh');
      bridge.setConsistencyMode('frozen');
      const nn = new window.NeuralNetwork(TOPOLOGY);
      if (nn.levels && nn.levels.length) {
        const last = nn.levels[nn.levels.length - 1];
        if (last && last.biases && last.biases.length) last.biases[0] = 9.9;
      }
      const newBrainId = bridge.archiveBrain(nn, 99999, trackVec, 9999);
      const fedAfterFreeze = bridge.recommendSeeds(trackVec, 10);
      const newBrainPresent = fedAfterFreeze.some(h => h.id === newBrainId);
      record('7. frozen compose — post-freeze brain absent from federated result',
             !newBrainPresent && fedAfterFreeze.length > 0,
             { newBrainId, newBrainPresent, federatedLen: fedAfterFreeze.length, firstIds: fedAfterFreeze.slice(0,3).map(h => h.id) });

      // Clean-up for the next run.
      bridge.setConsistencyMode('fresh');
      bridge.setFederationEnabled(false);

      const allOk = results.length > 0 && results.every(r => r.ok);
      summary.className = allOk ? 'pass' : 'fail';
      summary.textContent = allOk
        ? 'PASS — all ' + results.length + ' claim(s) hold.'
        : 'FAIL — ' + results.filter(r => !r.ok).length + ' of ' + results.length + ' failed.';
      window.__federationSmokeResult = { ok: allOk, results };
    } catch (e) {
      summary.className = 'fail';
      summary.textContent = 'FAIL — threw: ' + (e && e.message || e);
      console.error(e);
      window.__federationSmokeResult = { ok: false, error: String(e && e.stack || e) };
    }
  </script>
</body>
</html>
