<!DOCTYPE html>
<!--
  crosstab-smoke.html
  Phase 2B (F6) — cross-tab live training smoke harness.

  How to run:
    python3 -m http.server 8767       # from repo root
    open http://localhost:8767/tests/crosstab-smoke.html

  We simulate the two-tab case inside one page by opening TWO
  BroadcastChannel('vectorvroom-archive') instances (acting as fake tabs A and
  B). They share a bus and fire `message` events at each other. The harness
  also exercises archive/dedup directly (not the full bridge) to confirm that
  receiving the same brain twice creates only one canonical node — which is
  the invariant that makes cross-tab correct by construction.

  Asserts:
    1. A single `brain` post from tab A lands at tab B within 500ms.
    2. Two posts of the SAME brain from A, each routed into dedup.maybeInsert
       on B, produce { inserted: true } then { inserted: false } — i.e. only
       ONE canonical node, so the archive doesn't grow on replay.
    3. Posts from A carrying senderId 'A' are never surfaced as received by A
       itself (sender-echo suppression — BroadcastChannel doesn't echo to the
       sender, which is the base guarantee our senderId guard layers onto).

  PASS/FAIL lands in the DOM and on window.__crosstabSmokeResult.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Cross-tab smoke (F6)</title>
  <style>
    body { font: 14px/1.5 system-ui, -apple-system, sans-serif; max-width: 820px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { font-size: 1.2rem; margin: 0 0 .4em; }
    #summary { padding: .7em 1em; border-radius: 6px; margin: 1em 0; font-weight: 600; }
    #summary.pass { background: #d3f9d8; color: #2b8a3e; }
    #summary.fail { background: #ffe3e3; color: #c92a2a; }
    #summary.pending { background: #fff3bf; color: #5c3c00; }
    table { border-collapse: collapse; width: 100%; margin-top: .6em; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; vertical-align: top; }
    th { background: #f4f4f4; }
    tr.fail { background: #fff5f5; }
    tr.pass td:first-child { color: #2b8a3e; }
    pre { background: #f4f4f4; padding: .4em .6em; border-radius: 3px; overflow-x: auto; font-size: 11px; margin: .3em 0; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Cross-tab live training smoke (Phase 2B / F6)</h1>
  <p>Simulates two tabs via two <code>BroadcastChannel('vectorvroom-archive')</code>
    instances in one page. Exercises <code>archive/dedup.js</code> +
    <code>crosstab/wire.js</code> to verify the plan&apos;s claim:
    <em>broadcast eagerly, trust the hash</em>.</p>
  <div id="summary" class="pending">Running…</div>
  <table id="results">
    <thead><tr><th>#</th><th>check</th><th>verdict</th><th>detail</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <!-- NeuralNetwork + Level are needed by brainCodec self-check on load. -->
  <script src="../AI-Car-Racer/network.js"></script>
  <script>window.NeuralNetwork = NeuralNetwork; window.Level = Level;</script>

  <script type="module">
    import * as dedup from '../AI-Car-Racer/archive/dedup.js';
    import { hashBrain } from '../AI-Car-Racer/archive/hash.js';
    import { flatten, FLAT_LENGTH } from '../AI-Car-Racer/brainCodec.js';
    import { toWire, fromWire } from '../AI-Car-Racer/crosstab/wire.js';

    const CHANNEL_NAME = 'vectorvroom-archive';

    const rows = document.getElementById('rows');
    const summary = document.getElementById('summary');
    const results = [];
    function record(name, ok, detail){
      results.push({ name, ok, detail });
      const tr = document.createElement('tr');
      tr.className = ok ? 'pass' : 'fail';
      tr.innerHTML =
        '<td>' + results.length + '</td>' +
        '<td>' + name + '</td>' +
        '<td>' + (ok ? 'PASS' : 'FAIL') + '</td>' +
        '<td><pre>' + escapeHtml(typeof detail === 'string' ? detail : JSON.stringify(detail, null, 2)) + '</pre></td>';
      rows.appendChild(tr);
    }
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function makeFlat(seed){
      const f = new Float32Array(FLAT_LENGTH);
      for (let i = 0; i < FLAT_LENGTH; i++) f[i] = Math.sin(i * 0.13 + seed);
      return f;
    }

    if (typeof BroadcastChannel === 'undefined'){
      record('environment supports BroadcastChannel', false, 'BroadcastChannel undefined');
      summary.className = 'fail';
      summary.textContent = 'FAIL — BroadcastChannel unavailable in this browser';
      window.__crosstabSmokeResult = { ok: false, results };
    } else {
      try {
        // Two fake tabs on the same bus.
        const chA = new BroadcastChannel(CHANNEL_NAME);
        const chB = new BroadcastChannel(CHANNEL_NAME);
        const senderA = 'A_' + Math.random().toString(16).slice(2, 10);
        const senderB = 'B_' + Math.random().toString(16).slice(2, 10);

        const receivedAtB = [];
        const receivedAtA = [];
        chB.addEventListener('message', (ev) => {
          // Mimic the channel.js echo guard: drop our own senderId.
          if (ev && ev.data && ev.data.senderId === senderB) return;
          receivedAtB.push(ev.data);
        });
        chA.addEventListener('message', (ev) => {
          if (ev && ev.data && ev.data.senderId === senderA) return;
          receivedAtA.push(ev.data);
        });

        // ── Claim 1: tab A → tab B delivery within 500ms ─────────────────
        dedup._debugReset();
        const flat1 = makeFlat(0.3);
        const wire1 = toWire(flat1, 42.5, null, { generation: 3, parentIds: ['p1'] });
        const msg1 = { type: 'brain', senderId: senderA, payload: wire1 };
        chA.postMessage(msg1);

        await new Promise(res => setTimeout(res, 100));
        // Retry-loop up to 500ms to account for slow message dispatch on
        // some browsers (Firefox: ~2 microtasks; Safari: single microtask).
        const deadline1 = performance.now() + 500;
        while (receivedAtB.length === 0 && performance.now() < deadline1){
          await new Promise(res => setTimeout(res, 25));
        }
        const delivered = receivedAtB.length >= 1;
        let decoded = null;
        if (delivered){
          try { decoded = fromWire(receivedAtB[0].payload); }
          catch (e) { /* handled below */ }
        }
        const ok1 = delivered
                 && receivedAtB[0].type === 'brain'
                 && receivedAtB[0].senderId === senderA
                 && decoded
                 && decoded.flat instanceof Float32Array
                 && decoded.flat.length === FLAT_LENGTH
                 && decoded.hash === hashBrain(flat1)
                 && Math.abs(decoded.fitness - 42.5) < 1e-4
                 && decoded.meta.generation === 3
                 && Array.isArray(decoded.meta.parentIds)
                 && decoded.meta.parentIds[0] === 'p1';
        record('1. A → B delivery + wire decode (within 500ms)', ok1, {
          delivered, received: receivedAtB.length,
          type: receivedAtB[0]?.type, senderId: receivedAtB[0]?.senderId,
          hashMatch: decoded ? decoded.hash === hashBrain(flat1) : false,
          flatLen: decoded?.flat?.length,
          fitness: decoded?.fitness,
          meta: decoded?.meta,
        });

        // ── Claim 2: duplicate brain → dedup short-circuits ──────────────
        // Simulates tab B running each received payload through the same
        // dedup/archiveBrain pipeline the bridge uses. Two identical posts
        // must produce ONE canonical node — this is the invariant that
        // makes cross-tab lockless.
        dedup._debugReset();
        const flat2 = makeFlat(0.7);
        const wire2 = toWire(flat2, 17.0, null, { generation: 4 });
        const recvB = [];
        const tmpListener = (ev) => {
          if (!ev || !ev.data || ev.data.senderId === senderB) return;
          if (ev.data.type !== 'brain') return;
          const dec = fromWire(ev.data.payload);
          const ins = dedup.maybeInsert(dec.flat, dec.hash);
          recvB.push(ins);
        };
        chB.addEventListener('message', tmpListener);

        chA.postMessage({ type: 'brain', senderId: senderA, payload: wire2 });
        chA.postMessage({ type: 'brain', senderId: senderA, payload: wire2 });

        const deadline2 = performance.now() + 500;
        while (recvB.length < 2 && performance.now() < deadline2){
          await new Promise(res => setTimeout(res, 25));
        }
        chB.removeEventListener('message', tmpListener);

        const statsAfter = dedup.stats();
        const ok2 = recvB.length === 2
                 && recvB[0].inserted === true
                 && recvB[1].inserted === false
                 && recvB[0].canonicalId === recvB[1].canonicalId
                 && recvB[0].canonicalId === hashBrain(flat2)
                 && statsAfter.total === 2
                 && statsAfter.duplicates === 1;
        record('2. Duplicate brain dedups to one canonical node', ok2, {
          recvB, statsAfter, expectedHash: hashBrain(flat2),
        });

        // ── Claim 3: sender-echo suppression ─────────────────────────────
        // BroadcastChannel is specified NOT to echo to the sender; our
        // senderId guard is belt-and-braces. Tab A posting should never
        // surface at tab A (receivedAtA stays empty for A's own messages).
        // Also sanity-check that tab B CAN send back to A so we know the
        // bus is actually bidirectional.
        const receivedCountAtA_before = receivedAtA.length;
        chA.postMessage({ type: 'brain', senderId: senderA, payload: toWire(makeFlat(1.1), 0, null, {}) });
        await new Promise(res => setTimeout(res, 200));
        const selfEchoesAtA = receivedAtA.filter(m => m && m.senderId === senderA).length;

        // Prove the bus is bidirectional (B → A works) so a zero at A isn't
        // just "nothing ever gets delivered to A".
        chB.postMessage({ type: 'brain', senderId: senderB, payload: toWire(makeFlat(1.3), 0, null, {}) });
        const deadline3 = performance.now() + 500;
        while (receivedAtA.length === receivedCountAtA_before && performance.now() < deadline3){
          await new Promise(res => setTimeout(res, 25));
        }
        const fromB = receivedAtA.filter(m => m && m.senderId === senderB).length;

        const ok3 = selfEchoesAtA === 0 && fromB >= 1;
        record('3. Sender-echo suppressed; cross-tab direction intact', ok3, {
          selfEchoesAtA, fromB, totalAtA: receivedAtA.length,
        });

        try { chA.close(); } catch (_) {}
        try { chB.close(); } catch (_) {}
      } catch (e) {
        record('harness threw', false, (e && e.stack) ? e.stack : String(e));
      }

      const allOk = results.length > 0 && results.every(r => r.ok);
      summary.className = allOk ? 'pass' : 'fail';
      summary.textContent = allOk
        ? `PASS — ${results.length}/${results.length}`
        : `FAIL — ${results.filter(r => r.ok).length}/${results.length}`;
      window.__crosstabSmokeResult = { ok: allOk, results };
    }
  </script>
</body>
</html>
