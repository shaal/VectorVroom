<!DOCTYPE html>
<!--
  warm-restart-roundtrip.html
  Phase 1A (F3) — round-trip harness for exportSnapshot → toBlob → fromBlob
  → importSnapshot.

  How to run:
    python3 -m http.server 8765      # from repo root
    open http://localhost:8765/tests/warm-restart-roundtrip.html

  Asserts:
    1. validateSnapshot(exportSnapshot()) is ok.
    2. Post-import brain count equals pre-export brain count (and the set of
       ids matches exactly).
    3. recommendSeeds (top-1 by id) returns the same id on the same query
       vector before and after round-trip.

  PASS/FAIL lands in the DOM and on window.__warmRestartResult.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Warm-restart round-trip (F3)</title>
  <style>
    body { font: 14px/1.5 system-ui, -apple-system, sans-serif; max-width: 860px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { font-size: 1.2rem; margin: 0 0 .4em; }
    #summary { padding: .7em 1em; border-radius: 6px; margin: 1em 0; font-weight: 600; }
    #summary.pass { background: #d3f9d8; color: #2b8a3e; }
    #summary.fail { background: #ffe3e3; color: #c92a2a; }
    #summary.pending { background: #fff3bf; color: #5c3c00; }
    table { border-collapse: collapse; width: 100%; margin-top: .6em; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; vertical-align: top; }
    th { background: #f4f4f4; }
    tr.fail { background: #fff5f5; }
    tr.pass td:first-child { color: #2b8a3e; }
    pre { background: #f4f4f4; padding: .4em .6em; border-radius: 3px; overflow-x: auto; font-size: 11px; margin: .3em 0; }
  </style>
</head>
<body>
  <h1>Warm-restart round-trip (Phase 1A / F3)</h1>
  <p>Seeds the bridge with a small fixture, exports a snapshot, serializes
     it through <code>toBlob</code> / <code>fromBlob</code>, imports back,
     and compares.</p>
  <div id="summary" class="pending">Running…</div>
  <table id="results">
    <thead><tr><th>#</th><th>check</th><th>verdict</th><th>detail</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <!-- brainCodec / ruvectorBridge need NeuralNetwork on window. -->
  <script src="../AI-Car-Racer/network.js"></script>
  <script>window.NeuralNetwork = NeuralNetwork; window.Level = Level;</script>

  <script type="module">
    import * as bridge from '../AI-Car-Racer/ruvectorBridge.js';
    import { toBlob, fromBlob, gzipAvailable } from '../AI-Car-Racer/archive/serialize.js';
    import { validateSnapshot } from '../AI-Car-Racer/archive/snapshot.js';
    import { FLAT_LENGTH } from '../AI-Car-Racer/brainCodec.js';

    const rowsEl = document.getElementById('rows');
    const summaryEl = document.getElementById('summary');
    const results = [];
    function record(name, pass, detail){
      results.push({ name, pass, detail });
      const tr = document.createElement('tr');
      tr.className = pass ? 'pass' : 'fail';
      tr.innerHTML = '<td>' + results.length + '</td>' +
        '<td>' + name + '</td>' +
        '<td>' + (pass ? 'PASS' : 'FAIL') + '</td>' +
        '<td><pre>' + (detail == null ? '' : String(detail)) + '</pre></td>';
      rowsEl.appendChild(tr);
    }
    function finish(){
      const allPass = results.every(r => r.pass);
      summaryEl.className = allPass ? 'pass' : 'fail';
      summaryEl.textContent = allPass
        ? ('PASS — ' + results.length + '/' + results.length + ' claims hold')
        : ('FAIL — ' + results.filter(r => r.pass).length + '/' + results.length + ' claims hold');
      window.__warmRestartResult = { pass: allPass, results };
    }

    // Deterministic PRNG so re-runs are reproducible. Mulberry32.
    function mulberry32(seed){
      let t = seed | 0;
      return function(){
        t = (t + 0x6D2B79F5) | 0;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }
    function randFlat(rand, len){
      const f = new Float32Array(len);
      for (let i = 0; i < len; i++) f[i] = rand() * 2 - 1;
      return f;
    }
    function randTrack(rand){ return randFlat(rand, 512); }

    function buildFixture(n, seed){
      const rand = mulberry32(seed);
      const brains = [];
      const tracks = [];
      // One shared track so brain meta can reference it — mirrors what the
      // bridge does during live use.
      tracks.push({ id: 'track-0', vec: randTrack(rand), meta: { firstSeen: 1 } });
      for (let i = 0; i < n; i++) {
        brains.push({
          id: 'brain-' + i,
          vec: randFlat(rand, FLAT_LENGTH),
          meta: { fitness: 10 + i, generation: i, trackId: 'track-0', parentIds: [], timestamp: 1000 + i },
        });
      }
      return { brains, tracks, observations: [] };
    }

    async function run(){
      try {
        // Wait for bridge ready (opens IDB + wasm); we'll nuke it below so
        // any stored state doesn't leak into this harness.
        await bridge.ready();
        await bridge._debugReset();
        await bridge.ready(); // _debugReset doesn't retear the VectorDBs
                               // because ready() was already resolved; calling
                               // ready() again is a no-op (cached promise).
      } catch (e) {
        record('bridge.ready()', false, e && (e.stack || e.message || e));
        finish();
        return;
      }

      // The bridge's ready() caches its promise, so after _debugReset the
      // VectorDB instances are still live (mirror cleared, DBs retained).
      // hydrateFromFixture rebuilds the VectorDBs from scratch, which is
      // exactly what we want for a clean seed.
      const fixture = buildFixture(8, 0xDEADBEEF);
      bridge.hydrateFromFixture(fixture);

      // Query vector used for the top-1 comparison. Pick an existing brain's
      // track vector so we get a real retrieval hit (not a cold-start empty).
      const queryTrack = fixture.tracks[0].vec;
      const preSeeds = bridge.recommendSeeds(queryTrack, 1);
      const preTopId = preSeeds && preSeeds[0] ? preSeeds[0].id : null;
      const preBrainCount = bridge.info().brains;
      const preIds = new Set(Array.from((function* () {
        const i = bridge.info();
        // info() has counts but not ids; pull the ids via recommendSeeds k=All
        const k = i.brains;
        for (const s of (bridge.recommendSeeds(queryTrack, k) || [])) yield s.id;
      })()));

      // Claim #1 — validateSnapshot.
      let snap;
      try {
        snap = bridge.exportSnapshot();
        const v = validateSnapshot(snap);
        record('validateSnapshot(export) ok', v.ok,
          'mode=' + (snap.hnsw && snap.hnsw.mode) +
          ' brains=' + (snap.brains && snap.brains.length) +
          ' gzip=' + gzipAvailable() +
          ' witness=' + (snap.witness || '').slice(0, 20) + '…');
      } catch (e) {
        record('validateSnapshot(export) ok', false, e && (e.stack || e.message || e));
        finish();
        return;
      }

      // Pipe through toBlob + fromBlob.
      let rehydrated;
      try {
        const blob = await toBlob(snap);
        rehydrated = await fromBlob(blob);
      } catch (e) {
        record('serialize round-trip', false, e && (e.stack || e.message || e));
        finish();
        return;
      }
      const v2 = validateSnapshot(rehydrated);
      if (!v2.ok){
        record('validateSnapshot(rehydrated) ok', false, v2.reason);
        finish();
        return;
      }

      // Wipe state and import. The bridge's importSnapshot rebuilds all
      // three VectorDBs internally.
      await bridge._debugReset();
      try {
        const res = bridge.importSnapshot(rehydrated);
        record('importSnapshot result', !!(res && res.ok),
          'counts=' + JSON.stringify(res && res.counts));
      } catch (e) {
        record('importSnapshot result', false, e && (e.stack || e.message || e));
        finish();
        return;
      }

      // Claim #2 — brain count preserved.
      const postBrainCount = bridge.info().brains;
      record('brain count preserved (pre=' + preBrainCount + ' post=' + postBrainCount + ')',
        postBrainCount === preBrainCount,
        'pre=' + preBrainCount + ' post=' + postBrainCount);

      // Claim #3 — top-1 id matches on the same query vector.
      const postSeeds = bridge.recommendSeeds(queryTrack, 1);
      const postTopId = postSeeds && postSeeds[0] ? postSeeds[0].id : null;
      record('top-1 id identical across round-trip',
        preTopId != null && postTopId === preTopId,
        'pre=' + preTopId + ' post=' + postTopId);

      // Extra: id-set equality. This is stronger than the count check and
      // directly guards against a malformed importer that silently drops
      // entries matching an exporter quirk.
      const postIds = new Set(Array.from((function* () {
        const i = bridge.info();
        for (const s of (bridge.recommendSeeds(queryTrack, i.brains) || [])) yield s.id;
      })()));
      let sameIdSet = preIds.size === postIds.size;
      if (sameIdSet){
        for (const id of preIds) { if (!postIds.has(id)) { sameIdSet = false; break; } }
      }
      record('id set identical across round-trip', sameIdSet,
        'pre=' + JSON.stringify(Array.from(preIds).sort()) +
        ' post=' + JSON.stringify(Array.from(postIds).sort()));

      finish();
    }
    run();
  </script>
</body>
</html>
