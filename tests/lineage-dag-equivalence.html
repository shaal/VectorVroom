<!DOCTYPE html>
<!--
  lineage-dag-equivalence.html
  P3.B confidence gate: DAG-backed getLineage() must produce the same trail
  as the legacy in-function walker on a seeded archive.

  How to run:
    python3 -m http.server 8767    # from repo root
    open http://localhost:8767/tests/lineage-dag-equivalence.html

  Loads tests/fixtures/lineage-forest.json (80 brains, mix of lineages +
  isolates + multi-parent nodes), hydrates both the mirror and the DAG,
  then samples 50 random brain ids and asserts:
      bridge.getLineage(id)         === bridge.getLineageLegacy(id)
  for every sample (deep structural equality — id, fitness, generation of
  every step, in order).

  Machine-readable verdict lands on window.__lineageDagEqResult and
  #summary.textContent.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Lineage DAG equivalence</title>
  <style>
    body { font: 14px/1.5 system-ui, -apple-system, sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { font-size: 1.25rem; margin: 0 0 .5em; }
    #summary { padding: .8em 1em; border-radius: 6px; margin: 1em 0; font-weight: 600; }
    #summary.pass { background: #d3f9d8; color: #2b8a3e; }
    #summary.fail { background: #ffe3e3; color: #c92a2a; }
    #summary.pending { background: #fff3bf; color: #5c3c00; }
    table { border-collapse: collapse; width: 100%; font-size: 12px; margin-top: .8em; }
    th, td { border: 1px solid #ddd; padding: 2px 8px; text-align: left; }
    th { background: #f4f4f4; }
    tr.fail { background: #fff5f5; }
    tr.pass { color: #555; }
    pre { background: #f4f4f4; padding: .4em .6em; border-radius: 3px; overflow-x: auto; font-size: 11px; }
    .mono { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Lineage DAG equivalence gate (P3.B)</h1>
  <p>
    For 50 randomly-sampled brains from <code>lineage-forest.json</code>,
    DAG-path <code>getLineage()</code> must return a structurally-identical
    trail to the legacy walker. Any mismatch fails the gate.
  </p>
  <div id="summary" class="pending">Running…</div>
  <div id="info" class="mono" style="color:#555;"></div>
  <table id="results">
    <thead><tr><th>#</th><th>brain id</th><th>DAG depth</th><th>legacy depth</th><th>verdict</th><th>diff</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <script type="module">
    import * as bridge from '../AI-Car-Racer/ruvectorBridge.js';

    const SAMPLES = 50;
    const MAX_DEPTH = 6;

    const summaryEl = document.getElementById('summary');
    const infoEl = document.getElementById('info');
    const rowsEl = document.getElementById('rows');

    // Deterministic PRNG so the "50 random samples" are reproducible between
    // runs — a failure replays identically.
    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function trailsEqual(a, b) {
      if (!Array.isArray(a) || !Array.isArray(b)) return false;
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (a[i].id !== b[i].id) return false;
        if (Number(a[i].fitness) !== Number(b[i].fitness)) return false;
        if (Number(a[i].generation) !== Number(b[i].generation)) return false;
      }
      return true;
    }

    (async () => {
      try {
        await bridge.ready();
      } catch (e) {
        summaryEl.className = 'fail';
        summaryEl.textContent = 'bridge.ready() failed: ' + String(e);
        return;
      }

      const fixture = await fetch('./fixtures/lineage-forest.json').then((r) => r.json());
      bridge.hydrateFromFixture(fixture);

      const info = bridge.info();
      if (!info.lineageDag || !info.lineageDag.ready) {
        summaryEl.className = 'fail';
        summaryEl.textContent = 'FAIL — lineage DAG wasm module did not load; equivalence cannot be asserted.';
        window.__lineageDagEqResult = 'FAIL';
        return;
      }

      const allIds = fixture.brains.map((b) => b.id);
      const rand = mulberry32(42);
      const sampled = new Set();
      while (sampled.size < Math.min(SAMPLES, allIds.length)) {
        const idx = Math.floor(rand() * allIds.length);
        sampled.add(allIds[idx]);
      }
      const sampleIds = Array.from(sampled);

      infoEl.textContent =
        'archive: ' + info.brains + ' brains, ' + info.tracks + ' tracks · ' +
        'DAG: ' + info.lineageDag.nodeCount + ' nodes / ' + info.lineageDag.edgeCount + ' edges · ' +
        'sampled ' + sampleIds.length + ' ids (seed=42)';

      let pass = 0, fail = 0;
      for (let i = 0; i < sampleIds.length; i++) {
        const id = sampleIds[i];
        const dag = bridge.getLineage(id, MAX_DEPTH);
        const leg = bridge.getLineageLegacy(id, MAX_DEPTH);
        const ok = trailsEqual(dag, leg);
        if (ok) pass++; else fail++;
        const row = document.createElement('tr');
        row.className = ok ? 'pass' : 'fail';
        row.innerHTML =
          '<td>' + (i + 1) + '</td>' +
          '<td class="mono">' + id + '</td>' +
          '<td>' + dag.length + '</td>' +
          '<td>' + leg.length + '</td>' +
          '<td>' + (ok ? 'equal' : 'DIFFER') + '</td>' +
          '<td>' + (ok ? '' :
            '<pre>dag: ' + JSON.stringify(dag) + '\nleg: ' + JSON.stringify(leg) + '</pre>') + '</td>';
        rowsEl.appendChild(row);
      }

      const allPass = fail === 0;
      summaryEl.className = allPass ? 'pass' : 'fail';
      summaryEl.textContent = allPass
        ? 'PASS — ' + pass + '/' + sampleIds.length + ' sampled brains produce identical lineage under DAG and legacy paths.'
        : 'FAIL — ' + fail + '/' + sampleIds.length + ' samples differ between DAG and legacy paths.';
      window.__lineageDagEqResult = allPass ? 'PASS' : 'FAIL';
    })().catch((e) => {
      summaryEl.className = 'fail';
      summaryEl.textContent = 'Harness crashed: ' + String(e && e.stack || e);
      window.__lineageDagEqResult = 'FAIL';
    });
  </script>
</body>
</html>
