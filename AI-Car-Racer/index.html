<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <title>VRROMMOBILE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="slider.css">
    <link rel="stylesheet" href="eli15/eli15.css">

</head>

<body>
    <div id="fullDisplay">
        <div id="canvasDiv">
            <canvas id="myCanvas"></canvas>
        </div>
        <div id="bottomText">
            <h1>Train Your Model</h1>
        </div>
        <div id="rightPanel">
            <div id="verticalButtons"></div>
            <canvas id="inputCanvas"></canvas>
            <!-- <canvas id="graphCanvas"></canvas> -->
        </div>
        <div id="rv-panel"></div>
    </div>

    <div id="track-preset-picker" style="position:fixed; top:8px; left:8px; z-index:1000; background:rgba(28,32,40,0.92); color:#eee; padding:8px 10px; border-radius:6px; font:12px/1.4 system-ui,-apple-system,sans-serif; display:none; box-shadow:0 2px 8px rgba(0,0,0,0.35);">
        <label for="track-preset-select" style="display:block; margin-bottom:4px; opacity:0.85;">Load preset track:
            <span data-eli15="track-similarity" role="button" tabindex="0" aria-label="Learn: track similarity + warm-start"></span>
        </label>
        <select id="track-preset-select" style="margin-right:6px; background:#1a1d23; color:#eee; border:1px solid #3a3f48; border-radius:3px; padding:2px 4px;">
            <option value="">&mdash; select &mdash;</option>
        </select>
        <button id="track-preset-load" type="button" style="background:#3a7bd5; color:#fff; border:none; border-radius:3px; padding:3px 10px; cursor:pointer;">Load</button>
    </div>

    <script src="inputVisual.js"></script>
    <script src="grapher.js"></script>
    <script src="roadEditor.js"></script>
    <script src="network.js"></script>
    <!-- Classic-script `class` declarations do not land on globalThis; modules
         (brainCodec, ruvectorBridge) need these names to reconstruct brains. -->
    <script>window.NeuralNetwork = NeuralNetwork; window.Level = Level;</script>
    <script src="sensor.js"></script>
    <script src="utils.js"></script>
    <script src="road.js"></script>
    <script src="controls.js"></script>
    <script src="car.js"></script>
    <script src="buttonResponse.js"></script>
    <script src="main.js"></script>
    <script src="uiPanels.js"></script>
    <script src="trackPresets.js"></script>
    <!-- ELI15 teaching drawer — uses dynamic import() to lazy-load chapters,
         so it has to run from an http(s) origin (not file://). -->
    <script src="eli15/index.js"></script>
    <script type="module">
      // Sidecar module: warms the ruvector bridge and exposes handles on
      // window.__rvBridge / window.__rvUnflatten / window.__rvDynamics for
      // classic-script consumers (main.js uses unflatten to turn seed Float32
      // vectors into NeuralNetwork instances; the bridge itself has no
      // globalThis access to NeuralNetwork).
      import * as bridge from './ruvectorBridge.js';
      import * as dynamics from './dynamicsEmbedder.js';
      import { unflatten } from './brainCodec.js';
      window.__rvBridge = bridge;
      window.__rvDynamics = dynamics;
      window.__rvUnflatten = unflatten;
      bridge.ready().catch((e) => console.error('[ruvector] init failed', e));
    </script>
</body>
</html>
