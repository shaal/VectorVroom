<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VectorVroom</title>
  <!--
    Root-level entry point. The playable app lives under AI-Car-Racer/
    because ruvectorBridge.js statically imports ../vendor/ruvector/...,
    so the server root must sit one level above AI-Car-Racer/. This file
    just forwards visitors from / to the game.

    Social-share metadata duplicated here so unfurls on `vectorvroom.shaal.dev`
    (the bare domain — most-common shared URL) still get the rich preview.
    Most crawlers parse head before honoring the refresh/replace redirect.
  -->
  <meta name="description" content="Train a neural net to drive a car. Browser-native genetic algorithm with a cross-track vector-memory bridge.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VectorVroom">
  <meta property="og:title" content="VectorVroom — train a brain to race">
  <meta property="og:description" content="Browser-native genetic algorithm that teaches neural nets to drive, with a vector-memory bridge for cross-track transfer learning.">
  <meta property="og:url" content="https://vectorvroom.shaal.dev/">
  <meta property="og:image" content="https://vectorvroom.shaal.dev/og-image.jpg">
  <meta property="og:image:width" content="1168">
  <meta property="og:image:height" content="784">
  <meta property="og:image:alt" content="A cartoon pink brain driving a red sports car at sunset — VectorVroom logo.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="VectorVroom — train a brain to race">
  <meta name="twitter:description" content="Browser-native genetic algorithm that teaches neural nets to drive, with a vector-memory bridge for cross-track transfer learning.">
  <meta name="twitter:image" content="https://vectorvroom.shaal.dev/og-image.jpg">

  <!-- Canonical URL is the bare domain itself — this is the URL people
       paste into Slack/Twitter, so the social card should belong to it.
       Pointing canonical at /AI-Car-Racer/ caused some crawlers to dedupe
       the bare domain and never generate a card for it. -->
  <link rel="canonical" href="https://vectorvroom.shaal.dev/">

  <!-- Redirect real visitors into the game. The JS redirect fires for
       browsers; the meta-refresh with a 1s delay is the JS-disabled
       fallback (short but non-zero so crawlers that auto-follow refresh=0
       still have time to parse the head first). -->
  <meta http-equiv="refresh" content="1; url=./AI-Car-Racer/">
  <script>window.location.replace('./AI-Car-Racer/');</script>
</head>
<body>
  <p>Redirecting to <a href="./AI-Car-Racer/">VectorVroom</a>&hellip;</p>
</body>
</html>
